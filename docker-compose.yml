services:
  api:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: python -m uvicorn acn_api.main:create_app --factory --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      ACN_RUNTIME_STACK_ENABLED: "true"
      ACN_MINIO_ARTIFACT_BUCKET: acn-artifacts
      ACN_MLFLOW_EXPERIMENT_NAME: ACN Visual Adaptive Demo
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      create-minio-bucket:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: infra/docker/python.Dockerfile
    command: python -m acn_worker.main
    env_file:
      - .env
    environment:
      ACN_RUNTIME_STACK_ENABLED: "true"
      ACN_MINIO_ARTIFACT_BUCKET: acn-artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: acn
      POSTGRES_USER: acn
      POSTGRES_PASSWORD: acn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acn -d acn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  create-minio-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/mlflow;
      mc mb --ignore-existing local/acn-artifacts;
      "

  mlflow:
    build:
      context: .
      dockerfile: infra/docker/mlflow.Dockerfile
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://acn:acn@postgres:5432/acn
      --artifacts-destination s3://mlflow/
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      create-minio-bucket:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  minio_data:
